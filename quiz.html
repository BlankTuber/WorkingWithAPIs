<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Working With APIs - Quiz</title>
		<link rel="stylesheet" href="css/nav.css" />
		<link rel="stylesheet" href="css/root.css" />
		<link rel="stylesheet" href="css/quiz-setup.css" />
	</head>
	<body>
		<nav>
			<a href="index.html">🏠 Home</a>
			<a href="manga.html">📚 Manga</a>
			<a href="quiz.html">🧠 Quiz</a>
			<a href="tts.html">🔊 Text To Speech</a>
		</nav>
		<main>
			<section id="setupQuiz">
				<h2>🧠 Quiz Setup</h2>
				<p>Customize your quiz before starting.</p>

				<div class="setting">
					<label for="amountSelector">
						Questions:
						<span id="amountDisplay">10</span>
					</label>

					<input type="range" id="amountSelector" min="5" max="20" value="10" />
				</div>

				<div class="setting">
					<label for="categorySelector">Category</label>

					<select id="categorySelector">
						<option value="any">Any</option>
					</select>
				</div>

				<div class="setting">
					<label for="difficultySelector">Difficulty</label>

					<select id="difficultySelector">
						<option value="any">Any</option>
						<option value="easy">Easy</option>
						<option value="medium">Medium</option>
						<option value="hard">Hard</option>
					</select>
				</div>

				<div class="setting">
					<label for="questionTypeSelector">Question Type</label>

					<select id="questionTypeSelector">
						<option value="any">Any</option>
						<option value="multiple">Multiple Choice</option>
						<option value="boolean">True / False</option>
					</select>
				</div>

				<button id="startQuizBtn">🚀 Start Quiz</button>
			</section>
		</main>
		<script src="js/quiz-helpers.js"></script>
		<script src="js/quiz-setup.js"></script>
	</body>
</html>
